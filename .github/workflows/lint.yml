name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ktlint:
    if: github.repository == 'smithy-lang/smithy-swift' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Run ktlint
        run: ./gradlew ktlint

  swiftlint:
    if: github.repository == 'smithy-lang/smithy-swift' || github.event_name == 'pull_request'
    runs-on: macos-26
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Swiftlint
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
          which swiftlint
          swiftlint --version
      - name: Run swiftlint
        run: swiftlint --strict --reporter github-actions-logging
      - name: Compile project with Xcode
        run: xcodebuild -scheme smithy-swift-Package -destination platform=macOS > xcodebuild.log
      - name: Run swiftlint analyzer
        run: swiftlint analyze --strict --reporter github-actions-logging --compiler-log-path xcodebuild.log
